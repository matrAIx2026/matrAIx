<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>matrAIx OS — Evaluation Portal</title>
  <meta name="description" content="matrAIx OS: a live agent-swarm evaluation portal. Watch the neural eval core scan apps and websites, stream trajectory telemetry, and pull reports." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="benchmark.css?v=3" />
</head>
<body class="os">
  <div class="grain" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- System bar -->
  <div class="os-bar">
    <a class="os-id" href="index.html">matr<span class="ai">AI</span>x OS<span class="v">v4.8</span><span class="node">NODE-07</span></a>
    <div class="os-target">
      <span class="lbl">TARGET</span>
      <select id="target" class="os-select" aria-label="Evaluation target"></select>
      <button id="run" class="os-btn run">■ HALT</button>
    </div>
    <div class="os-status">
      <nav class="os-nav"><a href="index.html">Home</a><a href="explorer.html">Dimensions</a></nav>
      <span class="led on" data-led="core">CORE</span>
      <span class="led on" data-led="eval">EVAL</span>
      <span class="led on" data-led="net">NET</span>
      <span class="os-clock" id="clock">--:--:--</span>
    </div>
  </div>

  <!-- Main grid -->
  <div class="os-grid">
    <!-- Agent swarm -->
    <section class="win swarm">
      <div class="win-bar"><span>Agent Swarm</span><span id="swarmCount">0 active</span></div>
      <div class="swarm-list" id="swarmList"></div>
      <div class="swarm-foot">
        <div><b id="mEval">0</b><span>evaluated</span></div>
        <div><b id="mPass">—</b><span>pass rate</span></div>
        <div><b id="mRate">—</b><span>beh / s</span></div>
      </div>
    </section>

    <!-- Neural eval core -->
    <section class="win stage">
      <div class="win-bar"><span>Neural Eval Core</span><span class="scan-tag" id="scanTag">● SCANNING</span></div>
      <div class="brain-wrap">
        <canvas id="brain"></canvas>
        <div class="regions" id="regions"></div>
      </div>
      <div class="vitals" id="vitals">
        <div class="vital"><div class="vl">throughput</div><div class="vv" data-v="tp">—</div><div class="spark" data-s="tp"></div></div>
        <div class="vital"><div class="vl">mean reward</div><div class="vv" data-v="rw">—</div><div class="spark" data-s="rw"></div></div>
        <div class="vital"><div class="vl">active worlds</div><div class="vv" data-v="wd">—</div><div class="spark" data-s="wd"></div></div>
        <div class="vital"><div class="vl">latency p50</div><div class="vv" data-v="lat">—</div><div class="spark" data-s="lat"></div></div>
      </div>
    </section>

    <!-- Reports -->
    <section class="win intel">
      <div class="win-bar"><span>Reports</span><span class="rpt-sub" id="rptTarget"></span></div>
      <div class="report-tabs" id="reportTabs">
        <button class="rtab active" data-r="ab">A/B</button>
        <button class="rtab" data-r="seg">Seg</button>
        <button class="rtab" data-r="score">Dist</button>
        <button class="rtab" data-r="heat">Heat</button>
        <button class="rtab" data-r="find">Find</button>
      </div>
      <div class="intel-body" id="intelBody"></div>
      <button id="export" class="os-btn">⬇ Export trajectories (JSONL)</button>
    </section>
  </div>

  <!-- Trajectory telemetry -->
  <section class="console">
    <div class="win-bar"><span>Trajectory Telemetry</span><span id="conMeta">stream live</span></div>
    <div class="con-feed" id="conFeed"></div>
  </section>

  <script src="dimensions.js?v=3"></script>
  <script src="benchmark.js?v=3"></script>
</body>
</html>
